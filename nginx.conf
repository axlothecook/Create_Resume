# nginx config for the Create_Resume static SPA.
# Serves the compiled dist/ and falls back to index.html for any unknown path so
# client-side (in-app) navigation works on a hard refresh / direct URL.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: if the requested file/dir doesn't exist, serve index.html so the
    # React app boots and handles the route itself (instead of nginx returning 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted build assets (Vite emits hashed filenames, so they
    # can be cached aggressively — a new build produces new names).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compress text assets on the fly to cut transfer size.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

# nginx config for the Create_Resume static SPA.
# Serves the compiled dist/ and falls back to index.html for any unknown path so
# client-side (in-app) navigation works on a hard refresh / direct URL.

# Forwarded scheme passed to the backend: use the one Cloudflare's tunnel sent
# (X-Forwarded-Proto), and default to https when it's absent (production always runs
# behind HTTPS at the edge). This keeps the backend's Secure session cookie working.
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ''      https;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API under the SAME public domain (resume.axlothecook.com/api)
    # so the frontend and backend are same-origin. This makes the session cookie a
    # FIRST-PARTY cookie (SameSite=Lax) instead of a cross-site one — strict browsers
    # (Safari, Brave, Firefox, "block cross-site tracking") no longer drop the login
    # request. The trailing slash on proxy_pass strips the "/api" prefix, so
    # /api/auth/login reaches the backend as /auth/login.
    location /api/ {
        proxy_pass http://backend:3006/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Preserve the ORIGINAL scheme the browser used. Cloudflare's tunnel sets
        # X-Forwarded-Proto=https; we must forward THAT (not nginx's own internal http
        # $scheme), otherwise the backend — which trusts the proxy — thinks the request
        # is plain HTTP and refuses to set the Secure session cookie, breaking login.
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }

    # SPA fallback: if the requested file/dir doesn't exist, serve index.html so the
    # React app boots and handles the route itself (instead of nginx returning 404).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted build assets (Vite emits hashed filenames, so they
    # can be cached aggressively — a new build produces new names).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compress text assets on the fly to cut transfer size.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
